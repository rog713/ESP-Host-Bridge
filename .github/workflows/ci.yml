name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: |
          python -m unittest \
            tests.test_config_paths \
            tests.test_integration_registry \
            tests.test_mac_overrides \
            tests.test_runtime_snapshot \
            tests.test_status_contract \
            tests.test_usb_payload_contract

      - name: Check Python syntax
        run: |
          python -m py_compile \
            esp_host_bridge/*.py \
            esp_host_bridge/integrations/*.py \
            tests/*.py

      - name: Check browser bundle syntax
        run: node --check esp_host_bridge/host_ui.js
