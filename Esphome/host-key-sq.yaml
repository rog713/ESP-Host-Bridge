number:
  - platform: template
    name: "Screen Brightness"
    id: screen_brightness
    min_value: 0
    max_value: 255
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 255
    set_action:
      - lambda: |-
          if (!id(ss_active) && !id(display_sleeping)) {
            id(my_display).set_brightness((uint8_t)x);
          }

  - platform: template
    name: "Screensaver Timeout (s)"
    id: ss_timeout_seconds
    min_value: 10
    max_value: 3600
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 300

  - platform: template
    name: "Display Sleep Timeout (s)"
    id: idle_pause_timeout_seconds
    min_value: 30
    max_value: 7200
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 600

  - platform: template
    name: "Particle Period (ms)"
    id: ss_period_ms
    internal: true
    min_value: 1000
    max_value: 12000
    step: 50
    optimistic: true
    restore_value: false
    initial_value: 3500

  - platform: template
    name: "Particle Count"
    id: ss_particles_count
    internal: true
    min_value: 10
    max_value: 500
    step: 1
    optimistic: true
    restore_value: false
    initial_value: 180

