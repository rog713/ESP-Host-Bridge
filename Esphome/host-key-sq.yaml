  - id: draw_home_bg
    then:
      - lambda: |-
          if (id(home_bg_canvas) == nullptr) return;

          const int W = (int) lv_obj_get_width(id(home_bg_canvas));
          const int H = (int) lv_obj_get_height(id(home_bg_canvas));
          if (W < 4 || H < 4) return;

          const int cx = W / 2;
          const int cy = H / 2;
          const lv_color_t blue = lv_color_make(0x00, 0x00, 0xFF);
          const int r_outer = 58;

          lv_canvas_fill_bg(id(home_bg_canvas), lv_color_black(), LV_OPA_COVER);

          // Main crosshair lines stop where they meet the circle.
          lv_draw_line_dsc_t line;
          lv_draw_line_dsc_init(&line);
          line.width = 2;
          line.opa = LV_OPA_COVER;
          line.color = blue;

          lv_point_t pts[2];
          pts[0].x = cx; pts[0].y = 0;
          pts[1].x = cx; pts[1].y = cy - r_outer;
          lv_canvas_draw_line(id(home_bg_canvas), pts, 2, &line);
          pts[0].x = cx; pts[0].y = cy + r_outer;
          pts[1].x = cx; pts[1].y = H - 1;
          lv_canvas_draw_line(id(home_bg_canvas), pts, 2, &line);

          pts[0].x = 0; pts[0].y = cy;
          pts[1].x = cx - r_outer; pts[1].y = cy;
          lv_canvas_draw_line(id(home_bg_canvas), pts, 2, &line);
          pts[0].x = cx + r_outer; pts[0].y = cy;
          pts[1].x = W - 1; pts[1].y = cy;
          lv_canvas_draw_line(id(home_bg_canvas), pts, 2, &line);

          // Center ring.
