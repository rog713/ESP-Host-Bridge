                                      if (!item.empty() && item != "-") {
                                        std::string parts[5];
                                        size_t part_start = 0;
                                        int part_idx = 0;
                                        while (part_idx < 5 && part_start <= item.size()) {
                                          size_t part_end = item.find('|', part_start);
                                          parts[part_idx++] = (part_end == std::string::npos) ? item.substr(part_start) : item.substr(part_start, part_end - part_start);
                                          if (part_end == std::string::npos) break;
                                          part_start = part_end + 1;
                                        }
                                        if (parts[0] == name) {
                                          if (!parts[1].empty()) state_key = parts[1];
                                          if (!parts[4].empty()) state_label = parts[4];
