i2c:
  - id: bus_a
    sda: GPIO47
    scl: GPIO48
    frequency: 100kHz
    scan: true

spi:
  id: display_qspi
  type: quad
  clk_pin: 10
  data_pins: [11, 12, 13, 14]

touchscreen:
  platform: ft63x6
  i2c_id: bus_a
  id: touch
  transform:
    swap_xy: true
    mirror_x: false
    mirror_y: true
  calibration:
    y_min: 0
    y_max: 279
    x_min: 0
    x_max: 455
  on_touch:
    - lambda: |-
        const bool in_active_ui = (touch.x >= ${VIEWPORT_ACTIVE_X}) && (touch.x < (${VIEWPORT_ACTIVE_X} + ${VIEWPORT_ACTIVE_W}));
        if (!in_active_ui) return;

        id(ss_last_interaction_ms) = millis();
        if (!id(hints_dismissed)) {
          id(hints_dismissed) = true;
          auto hide = [](lv_obj_t *o) { if (o != nullptr) lv_obj_add_flag(o, LV_OBJ_FLAG_HIDDEN); };
          hide(id(docker_hint_label));
          hide(id(vms_hint_label));
          hide(id(settings_1_hint_label));
          hide(id(settings_2_hint_label));
          hide(id(sys_hint_label));
          hide(id(cpu_temp_hint_label));
          hide(id(disk_temp_hint_label));
          hide(id(disk_usage_hint_label));
          hide(id(gpu_hint_label));
          hide(id(uptime_hint_label));
          hide(id(host_name_hint_label));
          hide(id(info_net_hint_label));
        }
    - if:
        condition:
          and:
            - lambda: |-
                return (touch.x >= ${VIEWPORT_ACTIVE_X}) && (touch.x < (${VIEWPORT_ACTIVE_X} + ${VIEWPORT_ACTIVE_W}));
            - lvgl.is_paused
        then:
          - lambda: |-
              const uint32_t now = millis();
              const uint32_t window_ms = 700U;

              if (id(sleep_wake_tap_count) == 0 ||
                  (uint32_t)(now - id(sleep_wake_first_tap_ms)) > window_ms) {
                id(sleep_wake_tap_count) = 1;
                id(sleep_wake_first_tap_ms) = now;
                return;
              }

              id(sleep_wake_tap_count) = 0;
              id(sleep_wake_first_tap_ms) = 0U;
              id(display_sleeping) = false;
              id(ss_active) = false;
              id(ss_need_clear) = true;
              int br = (int)id(screen_brightness).state;
              if (br < 0) br = 0;
              if (br > 255) br = 255;
              id(my_display).set_brightness((uint8_t)br);
              id(host_offline_grace_until_ms) = now + 8000U;
          - if:
              condition:
                lambda: 'return !id(display_sleeping);'
              then:
                - script.execute: notify_host_display_wake
                - script.execute: notify_host_wifi_status
                - lvgl.resume
                - script.execute: restore_last_page

display:
  - platform: qspi_dbi
    id: my_display
    model: AXS15231
    cs_pin: 9
    reset_pin: 21
    update_interval: never
    dimensions:
      width: 280
      height: 456
      offset_width: 20
      offset_height: 0
    rotation: 90
    data_rate: 40MHz
    color_order: rgb
    draw_from_origin: false

    init_sequence:
      - [0x11]
      - [0xFE, 0x00]
      - [0xC4, 0x80]
