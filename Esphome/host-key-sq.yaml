                                  text_font: arimo_16
                                  bg_opa: TRANSP
                                  text: "Restart"
script:
  - id: restore_last_page
    then:
      - lambda: |-
          const int p = id(ui_last_page_idx);
          if (p == ${PAGE_DOCKER} && id(Docker) != nullptr && id(Docker)->obj != nullptr) { lv_scr_load(id(Docker)->obj); return; }
          if (p == ${PAGE_SETTINGS_1} && id(Settings_1) != nullptr && id(Settings_1)->obj != nullptr) { lv_scr_load(id(Settings_1)->obj); return; }
          if (p == ${PAGE_SETTINGS_2} && id(Settings_2) != nullptr && id(Settings_2)->obj != nullptr) { lv_scr_load(id(Settings_2)->obj); return; }
          if (p == ${PAGE_NETWORK} && id(Info_1) != nullptr && id(Info_1)->obj != nullptr) { lv_scr_load(id(Info_1)->obj); return; }
          if (p == ${PAGE_SYSTEM} && id(Info_2) != nullptr && id(Info_2)->obj != nullptr) { lv_scr_load(id(Info_2)->obj); return; }
          if (p == ${PAGE_CPU_TEMP} && id(Info_3) != nullptr && id(Info_3)->obj != nullptr) { lv_scr_load(id(Info_3)->obj); return; }
          if (p == ${PAGE_DISK_TEMP} && id(Info_4) != nullptr && id(Info_4)->obj != nullptr) { lv_scr_load(id(Info_4)->obj); return; }
          if (p == ${PAGE_DISK_USAGE} && id(Info_5) != nullptr && id(Info_5)->obj != nullptr) { lv_scr_load(id(Info_5)->obj); return; }
          if (p == ${PAGE_GPU} && id(Info_6) != nullptr && id(Info_6)->obj != nullptr) { lv_scr_load(id(Info_6)->obj); return; }
          if (p == ${PAGE_UPTIME} && id(Info_7) != nullptr && id(Info_7)->obj != nullptr) { lv_scr_load(id(Info_7)->obj); return; }
          if (p == ${PAGE_HOST_NAME} && id(Info_8) != nullptr && id(Info_8)->obj != nullptr) { lv_scr_load(id(Info_8)->obj); return; }
          if (p == ${PAGE_VMS} && id(VMS) != nullptr && id(VMS)->obj != nullptr) { lv_scr_load(id(VMS)->obj); return; }
          if (id(HOME) != nullptr && id(HOME)->obj != nullptr) lv_scr_load(id(HOME)->obj);
      - script.execute: apply_ui_viewport

  - id: notify_host_display_sleep
    then:
      - lambda: |-
          static const char msg[] = "CMD=display_sleep\n";
          id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(msg), sizeof(msg) - 1U);

  - id: notify_host_display_wake
    then:
      - lambda: |-
          static const char msg[] = "CMD=display_wake\n";
          id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(msg), sizeof(msg) - 1U);

  - id: notify_host_wifi_status
    then:
      - lambda: |-
          auto sanitize = [](std::string value) -> std::string {
            for (char &ch : value) {
              if (ch == ',' || ch == '\r' || ch == '\n') ch = '_';
            }
            return value;
          };
          const bool connected = id(esp_wifi_connected);
          if (!connected) {
            static const char msg[] = "ESP=WIFI,STATE=DISCONNECTED\n";
            id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(msg), sizeof(msg) - 1U);
            return;
          }
          const std::string ssid = sanitize(id(esp_wifi_ssid).state.c_str());
          const std::string ip = sanitize(id(esp_wifi_ip_address).state.c_str());
          const float rssi_f = id(esp_wifi_rssi_dbm).state;
          const bool have_rssi = (rssi_f == rssi_f) && rssi_f > -200.0f && rssi_f < 1.0f;
          char buf[192];
          if (have_rssi) {
            const int rssi = (int)(rssi_f >= 0.0f ? (rssi_f + 0.5f) : (rssi_f - 0.5f));
            snprintf(buf, sizeof(buf), "ESP=WIFI,STATE=CONNECTED,RSSI=%d,IP=%s,SSID=%s\n",
                     rssi, ip.empty() ? "-" : ip.c_str(), ssid.empty() ? "-" : ssid.c_str());
          } else {
            snprintf(buf, sizeof(buf), "ESP=WIFI,STATE=CONNECTED,IP=%s,SSID=%s\n",
                     ip.empty() ? "-" : ip.c_str(), ssid.empty() ? "-" : ssid.c_str());
          }
          id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(buf), strlen(buf));


  - id: apply_ui_viewport
    then:
      - lambda: |-
          const int active_w = ${VIEWPORT_ACTIVE_W};
          const int active_h = ${VIEWPORT_ACTIVE_H};

          auto set_page_viewport = [&](esphome::lvgl::LvPageType *page) {
            if (page == nullptr || page->obj == nullptr) return;
            lv_obj_set_pos(page->obj, ${VIEWPORT_ACTIVE_X}, 0);
            lv_obj_set_size(page->obj, active_w, active_h);
            lv_obj_clear_flag(page->obj, LV_OBJ_FLAG_SCROLLABLE);
            lv_obj_set_scrollbar_mode(page->obj, LV_SCROLLBAR_MODE_OFF);
          };

          auto scale_with = [](int v, float sx_local) -> int {
            const float sign = (v >= 0) ? 0.5f : -0.5f;
            return (int)(((float) v * sx_local) + sign);
          };

          auto scale_tree_x = [&](auto &&self, lv_obj_t *parent, float sx_local) -> void {
            if (parent == nullptr) return;
            const int parent_w = lv_obj_get_width(parent);
            const uint32_t cnt = lv_obj_get_child_cnt(parent);
            for (uint32_t i = 0; i < cnt; i++) {
              lv_obj_t *child = lv_obj_get_child(parent, i);
              if (child == nullptr) continue;

              const int x = lv_obj_get_x(child);
              const int w = lv_obj_get_width(child);

              if (x != 0) lv_obj_set_x(child, scale_with(x, sx_local));

              const bool is_full_width = (std::abs(w - parent_w) <= 2);
              const bool is_label = lv_obj_check_type(child, &lv_label_class);
              if (!is_label && !is_full_width && w > ((parent_w * 3) / 4)) {
                lv_obj_set_width(child, std::max(2, scale_with(w, sx_local)));
              }

              self(self, child, sx_local);
            }
          };

          auto scale_root_once = [&](lv_obj_t *root, int target_w) {
            if (root == nullptr) return;
            const int rw = lv_obj_get_width(root);
            if (rw <= 2 || target_w <= 2) return;
            if (rw <= (target_w + 2)) {
              lv_obj_align(root, LV_ALIGN_TOP_LEFT, ${VIEWPORT_ACTIVE_X}, 0);
              return;
            }
            const float sx_local = (float) target_w / (float) rw;
            scale_tree_x(scale_tree_x, root, sx_local);
            lv_obj_set_width(root, target_w);
            lv_obj_align(root, LV_ALIGN_TOP_LEFT, ${VIEWPORT_ACTIVE_X}, 0);
          };

          esphome::lvgl::LvPageType *pages[] = {
            id(HOME),
            id(Docker),
            id(Settings_1),
            id(Settings_2),
            id(Info_1),
            id(Info_2),
            id(Info_3),
            id(Info_4),
            id(Info_5),
            id(Info_6),
            id(Info_7),
            id(Info_8),
            id(VMS),
            id(Screen_Saver),
          };
          for (auto *page : pages) {
            set_page_viewport(page);
          }

          scale_root_once(id(content_HOME), active_w);
          scale_root_once(id(content_Docker), active_w);
          scale_root_once(id(content_Settings_1), active_w);
          scale_root_once(id(content_Settings_2), active_w);
          scale_root_once(id(content_Info_1), active_w);
          scale_root_once(id(content_Info_2), active_w);
          scale_root_once(id(content_Info_3), active_w);
          scale_root_once(id(content_Info_4), active_w);
          scale_root_once(id(content_Info_5), active_w);
          scale_root_once(id(content_Info_6), active_w);
          scale_root_once(id(content_Info_7), active_w);
          scale_root_once(id(content_Info_8), active_w);
