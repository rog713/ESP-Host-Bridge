    - id: Settings_1
      bg_color: 0x001F67
      scrollable: false
      on_load:
        then:
          - lambda: |-
              id(ui_last_page_idx) = ${PAGE_SETTINGS_1};
              if (id(settings_1_header) != nullptr) {
                lv_obj_set_style_bg_grad_dir(id(settings_1_header), LV_GRAD_DIR_HOR, 0);
                lv_obj_set_style_bg_color(id(settings_1_header), lv_color_make(0x00, 0x15, 0x44), 0);
                lv_obj_set_style_bg_grad_color(id(settings_1_header), lv_color_make(0x00, 0x0B, 0x26), 0);
                lv_obj_set_style_border_width(id(settings_1_header), 1, 0);
                lv_obj_set_style_border_side(id(settings_1_header), LV_BORDER_SIDE_BOTTOM, 0);
                lv_obj_set_style_border_color(id(settings_1_header), lv_color_make(0x2D, 0x58, 0xBC), 0);
                lv_obj_set_style_border_opa(id(settings_1_header), LV_OPA_60, 0);
              }
              if (id(screen_brightness_sub1_slider) != nullptr) {
                int v = (int)id(screen_brightness).state;
                if (v < 0) v = 0;
                if (v > 255) v = 255;
                lv_slider_set_value(id(screen_brightness_sub1_slider), v, LV_ANIM_OFF);
              }
      on_swipe_up:
        then:
          - if:
              condition:
                lambda: 'return !id(gesture_capture_active);'
              then:
                - lvgl.page.show: HOME
