interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              return id(esp_boot_announce_pending);
          then:
            - lambda: |-
                if (id(host_serial_seen)) {
                  id(esp_boot_announce_pending) = false;
                  id(esp_boot_announce_attempts_left) = 0;
                  return;
                }
                char buf[80];
                snprintf(buf, sizeof(buf), "ESP=BOOT,ID=%08lX,REASON=%s\n",
                         (unsigned long) id(esp_boot_announce_id),
                         id(esp_boot_reset_reason).c_str());
                id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(buf), strlen(buf));
                static const char wake_msg[] = "CMD=display_wake\n";
                id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(wake_msg), sizeof(wake_msg) - 1U);
                if (id(esp_boot_announce_attempts_left) > 0) {
                  id(esp_boot_announce_attempts_left)--;
                }
                if (id(esp_boot_announce_attempts_left) <= 0) {
                  id(esp_boot_announce_pending) = false;
                }

  - interval: 50ms
    then:
      - lambda: |-
          static std::string line;
          uint8_t c = 0;
          while (id(usb_cdc_data).read_byte(&c)) {
            if (c == '\r') continue;

            if (c == '\n') {
              if (line.empty()) continue;
              // ESP_LOGI("usb_cdc_data", "RX: %s", line.c_str());
                            id(host_serial_last_ms) = millis();
              id(host_serial_seen) = true;
              id(host_offline_dismissed) = false;
              id(host_offline_dismiss_until_ms) = 0U;
              id(host_offline_grace_until_ms) = 0U;

              auto getv = [&](const char *key) -> std::string {
                std::string token = std::string(key) + "=";
                const size_t p0 = line.find(token);
                if (p0 == std::string::npos) return "";
                const size_t p = p0 + token.size();
                size_t e = line.find(",", p);
                if (e == std::string::npos) e = line.size();
                return line.substr(p, e - p);
              };

              auto has_key = [&](const char *key) -> bool {
                return line.find(std::string(key) + "=") != std::string::npos;
              };

              std::string v;
              auto parse_enabled = [&](const std::string &raw) -> bool {
                std::string s = raw;
                for (size_t i = 0; i < s.size(); i++) {
                  char ch = s[i];
                  if (ch >= 'A' && ch <= 'Z') s[i] = (char) (ch - 'A' + 'a');
                }
                return !(s == "0" || s == "false" || s == "off" || s == "disabled" || s == "no");
              };
              bool got_power = false;

              v = getv("GPUEN");
              if (!v.empty()) {
                const bool enabled = parse_enabled(v);
                if (id(gpu_metrics_enabled) != enabled) {
                  id(gpu_metrics_enabled) = enabled;
                  if (!enabled) {
                    id(gpu_has_data) = false;
                    id(gpu_last_ms) = 0U;
                  }
                  id(gpu_redraw_pending) = true;
                }
              }

              v = getv("TEMPAV");
              if (!v.empty()) {
                const bool available = parse_enabled(v);
                if (id(cpu_temp_metric_available) != available) {
                  id(cpu_temp_metric_available) = available;
                  if (!available) {
                    id(temp_has_data) = false;
                    id(cpu_temp_last_ms) = 0U;
                  }
                  id(temp_redraw_pending) = true;
                }
              }

              v = getv("DISKTAV");
              if (!v.empty()) {
                const bool available = parse_enabled(v);
                if (id(disk_temp_metric_available) != available) {
                  id(disk_temp_metric_available) = available;
                  if (!available) {
                    id(disk_temp_has_data) = false;
                    id(disk_temp_last_ms) = 0U;
                  }
                  id(disk_temp_redraw_pending) = true;
                }
              }

              v = getv("GPUAV");
              if (!v.empty()) {
                const bool available = parse_enabled(v);
                if (id(gpu_metric_available) != available) {
                  id(gpu_metric_available) = available;
                  if (!available) {
                    id(gpu_has_data) = false;
                    id(gpu_last_ms) = 0U;
                  }
                  id(gpu_redraw_pending) = true;
                }
              }

              v = getv("DOCKEREN");
              if (!v.empty()) {
                const bool enabled = parse_enabled(v);
                if (id(docker_metrics_enabled) != enabled) {
                  id(docker_metrics_enabled) = enabled;
                  if (!enabled) {
                    id(docker_last_ms) = 0U;
                    id(docker_prev_payload).clear();
                    if (!id(docker_containers_compact).state.empty()) {
                      id(docker_containers_compact).publish_state("");
                    }
                    id(docker_containers_total_last) = 0.0f;
                    id(docker_containers_running_last) = 0.0f;
                    id(docker_containers_down_last) = 0.0f;
                    id(docker_summary_last_parsed_ms) = 0U;
                  }
                  id(docker_dirty) = true;
                }
              }

              v = getv("VMSEN");
              if (!v.empty()) {
                const bool enabled = parse_enabled(v);
                if (id(vms_metrics_enabled) != enabled) {
                  id(vms_metrics_enabled) = enabled;
                  if (!enabled) {
                    id(vms_last_ms) = 0U;
                    id(vms_prev_payload).clear();
                    if (!id(vms_guests_compact).state.empty()) {
                      id(vms_guests_compact).publish_state("");
                    }
                  }
                  id(vms_dirty) = true;
                }
              }

              v = getv("HOSTNAME");
              if (!v.empty()) id(gl_host_name).publish_state(v);

              v = getv("CPU");
              if (!v.empty()) {
                id(sys_cpu_pct_last) = atof(v.c_str());
                id(sys_has_data) = true;
                id(sys_redraw_pending) = true;
                id(sys_cpu_last_ms) = millis();
              }

              v = getv("TEMP");
              if (!v.empty() && id(cpu_temp_metric_available)) {
                id(cpu_temp_c_last) = atof(v.c_str());
                id(temp_has_data) = true;
                id(temp_redraw_pending) = true;
                id(cpu_temp_last_ms) = millis();
              }

              v = getv("MEM");
              if (!v.empty()) {
                id(sys_mem_pct_last) = atof(v.c_str());
                id(sys_has_data) = true;
                id(sys_redraw_pending) = true;
                id(sys_mem_last_ms) = millis();
              }

              v = getv("UP");
              if (!v.empty()) {
                id(uptime_seconds_last) = atof(v.c_str());
                id(uptime_has_data) = true;
                id(uptime_redraw_pending) = true;
                id(uptime_last_ms) = millis();
              }

              v = getv("DISKTEMP");
              if (v.empty()) v = getv("DISK_TEMP");
              if (!v.empty() && id(disk_temp_metric_available)) {
                id(disk_temp_c_last) = atof(v.c_str());
                id(disk_temp_has_data) = true;
                id(disk_temp_redraw_pending) = true;
                id(disk_temp_last_ms) = millis();
              }

              v = getv("DISKPCT");
              if (v.empty()) v = getv("DISK_PCT");
              if (v.empty()) v = getv("DISKUSE");
              if (!v.empty()) {
                id(disk_usage_pct_last) = atof(v.c_str());
                id(disk_usage_has_data) = true;
                id(disk_usage_redraw_pending) = true;
                id(disk_usage_last_ms) = millis();
              }

              v = getv("GPUT");
              if (v.empty()) v = getv("GPU_TEMP");
              if (!v.empty() && id(gpu_metric_available)) {
                id(gpu_temp_c_last) = atof(v.c_str());
                id(gpu_has_data) = true;
                id(gpu_redraw_pending) = true;
                id(gpu_last_ms) = millis();
              }

              v = getv("GPUU");
              if (v.empty()) v = getv("GPU_UTIL");
              if (!v.empty() && id(gpu_metric_available)) {
                id(gpu_util_pct_last) = atof(v.c_str());
                id(gpu_has_data) = true;
                id(gpu_redraw_pending) = true;
                id(gpu_last_ms) = millis();
              }

              v = getv("RX");
              if (!v.empty()) {
                if (!id(net_hist_init)) {
                  for (int i = 0; i < 48; i++) {
                    id(net_rx_hist)[i] = 0;
                    id(net_tx_hist)[i] = 0;
                  }
                  id(net_last_rx) = 0;
                  id(net_last_tx) = 0;
                  id(net_hist_init) = true;
                }
                float kbps = atof(v.c_str());
                if (kbps < 0.0f) kbps = 0.0f;
                id(net_rx_kbps_last) = kbps;
                float kbps_clamped = kbps;
                if (kbps_clamped > 4294967040.0f) kbps_clamped = 4294967040.0f;
                uint32_t sample = (uint32_t)(kbps_clamped + 0.5f);
                id(net_last_rx) = sample;
                id(net_has_data) = true;
                id(net_redraw_pending) = true;
                id(net_rx_last_ms) = millis();
              }

              v = getv("TX");
              if (!v.empty()) {
                if (!id(net_hist_init)) {
                  for (int i = 0; i < 48; i++) {
                    id(net_rx_hist)[i] = 0;
                    id(net_tx_hist)[i] = 0;
                  }
                  id(net_last_rx) = 0;
                  id(net_last_tx) = 0;
                  id(net_hist_init) = true;
                }
                float kbps = atof(v.c_str());
                if (kbps < 0.0f) kbps = 0.0f;
                id(net_tx_kbps_last) = kbps;
                float kbps_clamped = kbps;
                if (kbps_clamped > 4294967040.0f) kbps_clamped = 4294967040.0f;
                uint32_t sample = (uint32_t)(kbps_clamped + 0.5f);
                id(net_last_tx) = sample;
                id(net_has_data) = true;
                id(net_redraw_pending) = true;
                id(net_tx_last_ms) = millis();
              }

              v = getv("POWER");
              if (v.empty()) v = getv("HOST");
              if (v.empty()) v = getv("STATE");
              if (!v.empty()) {
                got_power = true;
                int next_state = 0;
                if (v == "SHUTTING_DOWN" || v == "SHUTDOWN") {
                  next_state = 1;
                } else if (v == "RESTARTING" || v == "REBOOTING" || v == "RESTART") {
                  next_state = 2;
                } else if (v == "RUNNING" || v == "ONLINE") {
                  next_state = 0;
                }
                id(host_power_state) = next_state;

                if (id(host_power_screen) != nullptr) {
                  if (next_state == 0) {
                    lv_obj_add_flag(id(host_power_screen), LV_OBJ_FLAG_HIDDEN);
                  } else {
                    if (id(HOME) != nullptr && id(HOME)->obj != nullptr && lv_scr_act() != id(HOME)->obj) {
                      lv_scr_load(id(HOME)->obj);
                    }
                    lv_obj_clear_flag(id(host_power_screen), LV_OBJ_FLAG_HIDDEN);
                    if (id(host_power_title) != nullptr) {
                      if (next_state == 1) {
                        lv_label_set_text(id(host_power_title), "SHUTTING DOWN");
                      } else {
                        lv_label_set_text(id(host_power_title), "RESTARTING");
                      }
                    }
                    if (id(host_power_subtitle) != nullptr) {
                      lv_label_set_text(id(host_power_subtitle), "Please wait...");
                    }
                  }
                }
              }
              if (!got_power && id(host_power_state) == 3) {
                id(host_power_state) = 0;
                if (id(host_power_screen) != nullptr) {
                  lv_obj_add_flag(id(host_power_screen), LV_OBJ_FLAG_HIDDEN);
                }
              }

              if (has_key("DOCKER")) {
                v = getv("DOCKER");
                id(docker_last_ms) = millis();
                id(docker_dirty) = true;
                if (id(docker_containers_compact).state != v) id(docker_containers_compact).publish_state(v);
              }

              if (has_key("VMS")) {
                v = getv("VMS");
                // Refresh VM UI age/dirty state even when the compact payload is unchanged, including VMS=.
                id(vms_last_ms) = millis();
                id(vms_dirty) = true;
                if (id(vms_guests_compact).state != v) {
                  id(vms_guests_compact).publish_state(v);
                }
              }

              line.clear();
              continue;
            }

            line.push_back((char) c);
            if (line.size() > 2048) {
              // ESP_LOGW("usb_cdc_data", "Dropping oversized line");
              line.clear();
            }
          }

