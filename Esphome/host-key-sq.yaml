esphome:
  name: host-key
  friendly_name: Host-Key
  min_version: 2025.12.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - lambda: |-
          const char *reset_reason = "UNKNOWN";
          switch (esp_reset_reason()) {
            case ESP_RST_UNKNOWN:   reset_reason = "UNKNOWN"; break;
            case ESP_RST_POWERON:   reset_reason = "POWERON"; break;
            case ESP_RST_EXT:       reset_reason = "EXT"; break;
            case ESP_RST_SW:        reset_reason = "SW"; break;
            case ESP_RST_PANIC:     reset_reason = "PANIC"; break;
            case ESP_RST_INT_WDT:   reset_reason = "INT_WDT"; break;
            case ESP_RST_TASK_WDT:  reset_reason = "TASK_WDT"; break;
            case ESP_RST_WDT:       reset_reason = "WDT"; break;
            case ESP_RST_DEEPSLEEP: reset_reason = "DEEPSLEEP"; break;
            case ESP_RST_BROWNOUT:  reset_reason = "BROWNOUT"; break;
            case ESP_RST_SDIO:      reset_reason = "SDIO"; break;
            case ESP_RST_USB:       reset_reason = "USB"; break;
            case ESP_RST_JTAG:      reset_reason = "JTAG"; break;
            case ESP_RST_EFUSE:     reset_reason = "EFUSE"; break;
            case ESP_RST_PWR_GLITCH: reset_reason = "PWR_GLITCH"; break;
            case ESP_RST_CPU_LOCKUP: reset_reason = "CPU_LOCKUP"; break;
            default: break;
          }
          id(esp_boot_reset_reason) = reset_reason;
          ESP_LOGI("boot", "Reset reason: %s (%d)", reset_reason, (int) esp_reset_reason());
          id(esp_boot_announce_id) = (uint32_t) esp_random();
          id(esp_boot_announce_attempts_left) = 30;
          id(esp_boot_announce_pending) = true;
      - delay: 750ms
      - script.execute: notify_host_display_wake
      - delay: 150ms
      - script.execute: notify_host_display_wake
      - delay: 250ms
      - script.execute: apply_ui_viewport

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  baud_rate: 0
  logs:
    component: WARN
    usb_cdc_data: INFO

api:
  encryption:
    key: !secret esp_host_bridge_api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5
  fast_connect: false
  power_save_mode: NONE
  reboot_timeout: 0s
  on_connect:
    - lambda: |-
        id(esp_wifi_connected) = true;
    - delay: 750ms
    - script.execute: notify_host_wifi_status
  on_disconnect:
    - lambda: |-
        id(esp_wifi_connected) = false;
    - script.execute: notify_host_wifi_status

tinyusb:

usb_cdc_acm:
  id: usb_cdc
  rx_buffer_size: 2048
  tx_buffer_size: 1024
  interfaces:
    - id: usb_cdc_data

