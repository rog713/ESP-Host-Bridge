                          - obj:
                              id: vms_row_9_card
                              x: 28
                              y: 654
                              width: 320
                              height: 52
                              scrollable: false
                              bg_color: 0x0B1E4A
                              bg_opa: "78%"
                              radius: 14
                              border_width: 1
                              border_color: 0x2D58BC
                              border_opa: "55%"
                              clickable: true
                              on_long_press:
                                - lambda: |-
                                    if (id(vms_name_modal_text) == nullptr || id(vms_modal_status_text) == nullptr ||
                                        id(vms_modal_details_text) == nullptr) return;
                                    const char *raw_name = lv_label_get_text(id(vms_row_9_name));
                                    if (raw_name == nullptr) return;
                                    const std::string name = std::string(raw_name);
                                    if (name.empty() || name == "--" || name == "Loading..." ||
                                        name == "Host offline" || name == "Stale data" ||
                                        name == "No virtual machines") return;

                                    std::string state_key = "stopped";
                                    std::string state_label = "Stopped";
                                    int vcpus = 0;
                                    int mem_mib = 0;
                                    const std::string payload = id(vms_guests_compact).state;
                                    size_t start = 0;
                                    while (start <= payload.size()) {
                                      size_t end = payload.find(';', start);
                                      std::string item = (end == std::string::npos) ? payload.substr(start) : payload.substr(start, end - start);
                                      if (!item.empty() && item != "-") {
                                        std::string parts[5];
                                        size_t part_start = 0;
                                        int part_idx = 0;
                                        while (part_idx < 5 && part_start <= item.size()) {
                                          size_t part_end = item.find('|', part_start);
                                          parts[part_idx++] = (part_end == std::string::npos) ? item.substr(part_start) : item.substr(part_start, part_end - part_start);
                                          if (part_end == std::string::npos) break;
                                          part_start = part_end + 1;
                                        }
                                        if (parts[0] == name) {
                                          if (!parts[1].empty()) state_key = parts[1];
                                          if (!parts[4].empty()) state_label = parts[4];
                                          int parsed_vcpus = atoi(parts[2].c_str());
                                          int parsed_mem = atoi(parts[3].c_str());
                                          if (parsed_vcpus > 0) vcpus = parsed_vcpus;
                                          if (parsed_mem > 0) mem_mib = parsed_mem;
                                          break;
                                        }
                                      }
                                      if (end == std::string::npos) break;
                                      start = end + 1;
                                    }

                                    id(vms_modal_state_key) = state_key;
                                    lv_label_set_text(id(vms_name_modal_text), name.c_str());
                                    lv_label_set_text(id(vms_modal_status_text), state_label.c_str());
                                    char details[80];
                                    if (vcpus > 0 && mem_mib > 0) snprintf(details, sizeof(details), "%d vCPU / %d MiB", vcpus, mem_mib);
                                    else if (vcpus > 0) snprintf(details, sizeof(details), "%d vCPU", vcpus);
                                    else if (mem_mib > 0) snprintf(details, sizeof(details), "%d MiB", mem_mib);
                                    else snprintf(details, sizeof(details), "Details unavailable");
                                    lv_label_set_text(id(vms_modal_details_text), details);
                                - script.execute: sync_vms_modal
                                - lvgl.widget.show: vms_name_modal
