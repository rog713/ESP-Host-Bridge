                std::string state_key = parts[1].empty() ? "stopped" : parts[1];
                std::string state_label = parts[4];
                if (state_label.empty()) {
                  if (state_key == "running") state_label = "Running";
                  else if (state_key == "paused") state_label = "Paused";
                  else if (state_key == "stopped") state_label = "Stopped";
                  else state_label = "Unknown";
                }
                const int vcpus = atoi(parts[2].c_str());
                const int mem_mib = atoi(parts[3].c_str());
                total++;
                if (state_key == "running") running++;
                else if (state_key == "paused") paused++;
                else if (state_key == "stopped") stopped++;
                else other++;
                if (item_count < 32) {
                  items[item_count].name = name;
                  items[item_count].state_key = state_key;
                  items[item_count].state_label = state_label;
                  items[item_count].vcpus = vcpus;
                  items[item_count].mem_mib = mem_mib;
                  item_count++;
                }
              }
            }
            if (end == std::string::npos) break;
            start = end + 1;
          }

