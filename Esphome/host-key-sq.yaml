          if (disabled) return;
          if (unavailable) return;
          if (!have_data || stale) return;

          auto sample_to_y = [&](uint32_t v) -> int {
            const int h = std::max(1, H - 2);
            if (v > maxv) v = maxv;
            int y = base_y - (int)(((uint64_t)v * (uint64_t)h) / (uint64_t)maxv);
            if (y < 0) y = 0;
            if (y > base_y) y = base_y;
            return y;
          };

          auto interp_at_x = [&](const std::array<uint16_t, 48> &arr, int x) -> uint32_t {
            const int srcN = 48;
            if (W <= 1) return (uint32_t)arr[srcN - 1];
            const int denom = W - 1;
            const int n = x * (srcN - 1);
            const int i0 = n / denom;
            const int frac = n - i0 * denom;
            const int i1 = (i0 < (srcN - 1)) ? (i0 + 1) : i0;
            const int32_t v0 = (int32_t)arr[i0];
            const int32_t v1 = (int32_t)arr[i1];
            int32_t v = v0 + ((v1 - v0) * frac) / denom;
            if (v < 0) v = 0;
            return (uint32_t)v;
          };

          lv_draw_line_dsc_t util_fill;
          lv_draw_line_dsc_init(&util_fill);
          util_fill.width = 1;
          util_fill.opa = LV_OPA_50;
          util_fill.color = lv_color_make(0x38, 0xBD, 0xF8);

          lv_draw_line_dsc_t util_line;
          lv_draw_line_dsc_init(&util_line);
          util_line.width = 2;
          util_line.opa = LV_OPA_COVER;
          util_line.color = lv_color_make(0x38, 0xBD, 0xF8);
          util_line.round_start = 1;
          util_line.round_end = 1;

          lv_draw_line_dsc_t temp_fill;
          lv_draw_line_dsc_init(&temp_fill);
          temp_fill.width = 1;
          temp_fill.opa = LV_OPA_40;
          temp_fill.color = lv_color_make(0xA8, 0x55, 0xF7);

          lv_draw_line_dsc_t temp_line;
          lv_draw_line_dsc_init(&temp_line);
          temp_line.width = 2;
          temp_line.opa = LV_OPA_COVER;
          temp_line.color = lv_color_make(0xA8, 0x55, 0xF7);
          temp_line.round_start = 1;
          temp_line.round_end = 1;

          for (int x = 0; x < W; x++) {
            const uint32_t uv = interp_at_x(id(gpu_util_hist), x);
            const uint32_t tv = interp_at_x(id(gpu_temp_hist), x);
            const int uy = sample_to_y(uv);
            const int ty = sample_to_y(tv);

            pts2[0].x = x; pts2[0].y = uy;
            pts2[1].x = x; pts2[1].y = base_y;
            if (uy < base_y) lv_canvas_draw_line(id(gpu_graph), pts2, 2, &util_fill);

            pts2[0].y = ty;
            if (ty < base_y) lv_canvas_draw_line(id(gpu_graph), pts2, 2, &temp_fill);
          }

          lv_point_t p_util, p_temp, cur;
          p_util.x = 0; p_util.y = sample_to_y(interp_at_x(id(gpu_util_hist), 0));
          p_temp.x = 0; p_temp.y = sample_to_y(interp_at_x(id(gpu_temp_hist), 0));
          for (int x = 2; x < W; x += 2) {
            cur.x = x;
            cur.y = sample_to_y(interp_at_x(id(gpu_util_hist), x));
            pts2[0] = p_util;
            pts2[1] = cur;
            lv_canvas_draw_line(id(gpu_graph), pts2, 2, &util_line);
            p_util = cur;

            cur.y = sample_to_y(interp_at_x(id(gpu_temp_hist), x));
            pts2[0] = p_temp;
            pts2[1] = cur;
            lv_canvas_draw_line(id(gpu_graph), pts2, 2, &temp_line);
            p_temp = cur;
          }

          lv_draw_rect_dsc_t dot;
          lv_draw_rect_dsc_init(&dot);
          dot.radius = 6;
          dot.bg_opa = LV_OPA_COVER;
          dot.border_width = 2;
          dot.border_opa = LV_OPA_COVER;

          const int endx = W - 1;
          const int util_endy = sample_to_y(interp_at_x(id(gpu_util_hist), endx));
          const int temp_endy = sample_to_y(interp_at_x(id(gpu_temp_hist), endx));

          dot.bg_color = lv_color_make(0x38, 0xBD, 0xF8);
          dot.border_color = lv_color_make(0xE0, 0xF2, 0xFE);
          lv_canvas_draw_rect(id(gpu_graph), endx - 4, util_endy - 4, 9, 9, &dot);

          dot.bg_color = lv_color_make(0xA8, 0x55, 0xF7);
          dot.border_color = lv_color_make(0xF3, 0xE8, 0xFF);
          lv_canvas_draw_rect(id(gpu_graph), endx - 4, temp_endy - 4, 9, 9, &dot);

          id(gpu_redraw_pending) = false;

  - id: redraw_uptime_graph
    then:
      - lambda: |-
          if (id(Info_7) == nullptr || id(Info_7)->obj == nullptr) return;
          // Only update when the Uptime subpage is actually visible.
          if (lv_scr_act() != id(Info_7)->obj) return;

          const uint32_t now = millis();
          const uint32_t u_ms = id(uptime_last_ms);
          const bool have_data = id(uptime_has_data) && u_ms != 0U;
          const uint32_t age_ms = have_data ? (uint32_t)(now - u_ms) : 0U;
          const bool stale = have_data && age_ms > 15000U;
          const bool offline_suppressed =
              id(display_sleeping) ||
              (id(host_offline_grace_until_ms) != 0U &&
               (int32_t)(id(host_offline_grace_until_ms) - now) > 0);
          const bool offline =
              !offline_suppressed &&
              (id(host_power_state) == 3 ||
               (id(host_serial_seen) && id(host_serial_last_ms) != 0U &&
                (uint32_t)(now - id(host_serial_last_ms)) > 5000U));

          if (id(uptime_status_badge) != nullptr) {
            if (offline) {
              lv_label_set_text(id(uptime_status_badge), "OFFLINE");
              lv_obj_set_style_text_color(id(uptime_status_badge), lv_color_make(0xF9, 0xA8, 0xD4), 0);
              lv_obj_clear_flag(id(uptime_status_badge), LV_OBJ_FLAG_HIDDEN);
            } else if (!have_data) {
              lv_label_set_text(id(uptime_status_badge), "LOADING");
              lv_obj_set_style_text_color(id(uptime_status_badge), lv_color_make(0xFC, 0xD3, 0x4D), 0);
              lv_obj_clear_flag(id(uptime_status_badge), LV_OBJ_FLAG_HIDDEN);
            } else if (stale) {
              lv_label_set_text(id(uptime_status_badge), "STALE");
              lv_obj_set_style_text_color(id(uptime_status_badge), lv_color_make(0xFD, 0xBA, 0x74), 0);
              lv_obj_clear_flag(id(uptime_status_badge), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_label_set_text(id(uptime_status_badge), "LIVE");
              lv_obj_set_style_text_color(id(uptime_status_badge), lv_color_make(0x86, 0xEF, 0xAC), 0);
              lv_obj_clear_flag(id(uptime_status_badge), LV_OBJ_FLAG_HIDDEN);
            }
          }

          // Show uptime as Days/Hours/Minutes.
          if (id(uptime_value) != nullptr) {
            const float x = id(uptime_seconds_last);
            const uint32_t s = (uint32_t) (isnan(x) || x < 0 ? 0 : x);
            const uint32_t d = s / 86400U;
            const uint32_t h = (s % 86400U) / 3600U;
            const uint32_t m = (s % 3600U) / 60U;
            char buf[24];
            snprintf(buf, sizeof(buf), "%ud %uh %um", (unsigned)d, (unsigned)h, (unsigned)m);
            lv_label_set_text(id(uptime_value), buf);
            lv_obj_set_style_text_color(id(uptime_value), stale ? lv_color_make(0x9C, 0xA3, 0xAF) : lv_color_make(0xF3, 0xE8, 0xFF), 0);
          }

          id(uptime_redraw_pending) = false;

