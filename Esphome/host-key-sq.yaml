      on_press:
        then:
          - lambda: |-
              id(ss_last_interaction_ms) = millis();
              id(display_sleeping) = false;
              id(ss_active) = false;
              id(ss_need_clear) = true;
              int br = (int)id(screen_brightness).state;
              if (br < 0) br = 0;
              if (br > 255) br = 255;
              id(my_display).set_brightness((uint8_t)br);
              id(host_offline_grace_until_ms) = millis() + 8000U;
          - script.execute: notify_host_display_wake
