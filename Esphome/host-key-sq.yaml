  - interval: 33ms
    then:
      - if:
          condition:
            lambda: |-
              return !id(boot_hidden)
                  && id(boot_screen) != nullptr
                  && !lv_obj_has_flag(id(boot_screen), LV_OBJ_FLAG_HIDDEN);
          then:
            - lambda: |-
                if (id(boot_anim_canvas) != nullptr) {
                  const int W = (int) lv_obj_get_width(id(boot_anim_canvas));
                  const int H = (int) lv_obj_get_height(id(boot_anim_canvas));
                  if (W > 20 && H > 20) {
                    static float phase = 0.0f;
                    const float TWO_PI = 6.2831853f;
                    phase += 0.07f;
                    if (phase >= TWO_PI) phase -= TWO_PI;

                    const int cx = W / 2;
                    const int cy = H / 2;
                    // Tune shape to match a natural infinity loop (avoid stretched appearance).
                    const float margin_x = 22.0f;
                    const float margin_y = 24.0f;
                    const float desired_ratio = 2.15f;  // width:height of the path
                    const float a = ((((float) W) - (2.0f * margin_x)) * 0.5f);
                    float b = (2.0f * a) / desired_ratio;  // width/height = 2a/b
                    const float b_limit = ((float) H) - (2.0f * margin_y);
                    if (b > b_limit) b = b_limit;
                    if (b < 8.0f) b = 8.0f;

                    static bool styles_init = false;
                    static lv_draw_line_dsc_t track_outer;
                    static lv_draw_line_dsc_t track_inner;
                    static lv_draw_rect_dsc_t trail;
                    static lv_draw_rect_dsc_t halo;
                    static lv_draw_rect_dsc_t head;
                    if (!styles_init) {
                      lv_draw_line_dsc_init(&track_outer);
                      track_outer.width = 10;
                      track_outer.opa = LV_OPA_80;
                      track_outer.color = lv_color_make(0x2A, 0x2F, 0x38);
                      track_outer.round_start = 1;
                      track_outer.round_end = 1;

                      lv_draw_line_dsc_init(&track_inner);
                      track_inner.width = 6;
                      track_inner.opa = LV_OPA_70;
                      track_inner.color = lv_color_make(0x1A, 0x1F, 0x27);
                      track_inner.round_start = 1;
                      track_inner.round_end = 1;

                      lv_draw_rect_dsc_init(&trail);
                      trail.border_width = 0;
                      trail.radius = LV_RADIUS_CIRCLE;

                      lv_draw_rect_dsc_init(&halo);
                      halo.border_width = 0;
                      halo.radius = LV_RADIUS_CIRCLE;
                      halo.bg_color = lv_color_make(0x60, 0xA8, 0xFF);
                      halo.bg_opa = LV_OPA_70;

                      lv_draw_rect_dsc_init(&head);
                      head.border_width = 0;
                      head.radius = LV_RADIUS_CIRCLE;
                      head.bg_color = lv_color_make(0xFF, 0xFF, 0xFF);
                      head.bg_opa = LV_OPA_COVER;
                      styles_init = true;
                    }

                    const int SEG = 60;
                    static int path_x[85];
                    static int path_y[85];
                    static int path_w = 0;
                    static int path_h = 0;
                    static float path_a = 0.0f;
                    static float path_b = 0.0f;
                    if (path_w != W || path_h != H || fabsf(path_a - a) > 0.25f || fabsf(path_b - b) > 0.25f) {
                      for (int i = 0; i <= SEG; i++) {
                        const float t = (TWO_PI * (float) i) / (float) SEG;
                        path_x[i] = cx + (int) (a * sinf(t));
                        path_y[i] = cy + (int) (b * sinf(t) * cosf(t));
                      }
                      path_w = W;
                      path_h = H;
                      path_a = a;
                      path_b = b;
                    }

                    lv_canvas_fill_bg(id(boot_anim_canvas), lv_color_black(), LV_OPA_COVER);

                    lv_point_t seg_pts[2];
                    for (int i = 1; i <= SEG; i++) {
                      seg_pts[0].x = path_x[i - 1];
                      seg_pts[0].y = path_y[i - 1];
                      seg_pts[1].x = path_x[i];
                      seg_pts[1].y = path_y[i];
                      lv_canvas_draw_line(id(boot_anim_canvas), seg_pts, 2, &track_outer);
                      lv_canvas_draw_line(id(boot_anim_canvas), seg_pts, 2, &track_inner);
                    }

                    auto wrap_phase = [&](float t) -> float {
                      while (t < 0.0f) t += TWO_PI;
                      while (t >= TWO_PI) t -= TWO_PI;
                      return t;
                    };

                    // Blue trail moving around the track.
                    const int TAIL = 10;
                    for (int i = TAIL; i >= 0; i--) {
                      const float tt = wrap_phase(phase - 0.09f * (float) i);
                      const int tx = cx + (int) (a * sinf(tt));
                      const int ty = cy + (int) (b * sinf(tt) * cosf(tt));
                      const int k = TAIL - i;
                      int r = 2 + (k / 4);
                      if (k >= TAIL - 1) r = 7;
                      trail.bg_color = lv_color_make(0x2C, 0x7F, (uint8_t) (180 + (k * 75) / TAIL));
                      trail.bg_opa = (lv_opa_t) (15 + (k * 215) / TAIL);
                      lv_canvas_draw_rect(id(boot_anim_canvas), tx - r, ty - r, r * 2, r * 2, &trail);
                    }

                    // Head glow + bright core.
                    const int hx = cx + (int) (a * sinf(phase));
                    const int hy = cy + (int) (b * sinf(phase) * cosf(phase));

                    lv_canvas_draw_rect(id(boot_anim_canvas), hx - 10, hy - 10, 20, 20, &halo);
                    lv_canvas_draw_rect(id(boot_anim_canvas), hx - 4, hy - 4, 8, 8, &head);
                  }
                }

  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              return !id(boot_hidden) && id(host_serial_seen);
