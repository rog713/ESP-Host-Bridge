    then:
      - lambda: |-
          if (!id(boot_hidden)) return;
          if (!id(host_serial_seen)) return;
          if (id(host_power_state) != 0) return;
          const uint32_t now = millis();
          const bool offline_suppressed =
              id(display_sleeping) ||
              (id(host_offline_grace_until_ms) != 0U &&
               (int32_t)(id(host_offline_grace_until_ms) - now) > 0);
          if (id(ss_active) || offline_suppressed) {
            if (id(host_power_screen) != nullptr) {
              lv_obj_add_flag(id(host_power_screen), LV_OBJ_FLAG_HIDDEN);
            }
            return;
          }

          const uint32_t last_rx = id(host_serial_last_ms);
          if (last_rx == 0U) return;

          if (id(host_offline_dismissed)) {
            const uint32_t until = id(host_offline_dismiss_until_ms);
            if (until != 0U && (int32_t)(until - now) > 0) return;
            id(host_offline_dismissed) = false;
            id(host_offline_dismiss_until_ms) = 0U;
          }

          // If no host telemetry for >5s, assume external shutdown/restart in progress.
          if ((uint32_t)(now - last_rx) < 5000U) {
            id(host_offline_dismissed) = false;
            id(host_offline_dismiss_until_ms) = 0U;
            return;
          }

          id(host_power_state) = 3;
          if (id(host_power_screen) != nullptr) {
            lv_obj_clear_flag(id(host_power_screen), LV_OBJ_FLAG_HIDDEN);
          }
          if (id(host_power_title) != nullptr) {
            lv_label_set_text(id(host_power_title), "HOST OFFLINE");
          }
          if (id(host_power_subtitle) != nullptr) {
            lv_label_set_text(id(host_power_subtitle), "Shutting down or restarting...");
          }

  - interval: 33ms
    then:
      - lambda: |-
          if (!id(ss_active)) return;
          if (!id(ss_canvas)) return;

          auto rnd = []() -> uint32_t { return esp_random(); };
          auto rnd_i = [&](int a, int b) -> int {
            if (b <= a) return a;
            return a + (int)(rnd() % (uint32_t)(b - a));
          };

          struct Particle {
            float x;
            float y;
            float angle;
            float speed;
            float phase;
            int16_t pcx;
            int16_t pcy;
            uint8_t size;
            uint8_t color;
            uint8_t pr;
            uint8_t prev_drawn;
            uint8_t active;
          };

          auto *p = reinterpret_cast<Particle*>(id(ss_particles_buf).data());
          const int MAX_PARTICLES = 500;
          int N = (int) id(ss_particles_count).state;
          if (N < 1) N = 1;
          if (N > MAX_PARTICLES) N = MAX_PARTICLES;
          uint32_t PERIOD = (uint32_t) id(ss_period_ms).state;
          if (PERIOD < 1200U) PERIOD = 1200U;
          if (PERIOD > 12000U) PERIOD = 12000U;

          const uint32_t now = millis();
          uint32_t last = id(ss_last_ms);
          if (last == 0) last = now;
          id(ss_last_ms) = now;

          float dt = (float) (now - last) / 1000.0f;
          if (dt < 0.001f) dt = 0.001f;
          if (dt > 0.050f) dt = 0.050f;

          if (id(ss_need_clear)) {
            lv_canvas_fill_bg(id(ss_canvas), lv_color_black(), LV_OPA_COVER);
            for (int i = 0; i < MAX_PARTICLES; i++) {
              p[i].prev_drawn = 0;
              p[i].active = 0;
            }
            id(ss_need_clear) = false;
          }

          const float TAU = 6.2831853f;
          const float PI = 3.1415926f;
          const float time_s = (float)now * 0.001f;
          const float flow_t = time_s / std::max(1.5f, (float)PERIOD * 0.001f);

          const uint8_t pr_[3] = {0x00, 0x0A, 0x64};
          const uint8_t pg_[3] = {0x7A, 0x12, 0x0C};
          const uint8_t pb_[3] = {0xFF, 0xFF, 0x96};

          auto spawn = [&](int i) {
            const int margin = 10;
            p[i].x = (float) rnd_i(margin, ${SS_W} - margin);
            p[i].y = (float) rnd_i(margin, ${SS_H} - margin);
            p[i].angle = ((float)(rnd() & 1023U) / 1023.0f) * TAU;
            p[i].speed = 26.0f + ((float)(rnd() % 100U) * 0.30f);
            p[i].phase = ((float)((rnd() >> 10) & 1023U) / 1023.0f) * TAU;
            p[i].size = (uint8_t) rnd_i(1, 5);
            p[i].color = (uint8_t) rnd_i(0, 3);
            p[i].pcx = 0;
            p[i].pcy = 0;
            p[i].pr = 0;
            p[i].prev_drawn = 0;
            p[i].active = 1;
          };

          auto wrap_angle = [&](float a) -> float {
            while (a > PI) a -= TAU;
            while (a < -PI) a += TAU;
            return a;
          };

          for (int i = 0; i < N; i++) {
            if (!p[i].active) spawn(i);
          }

          lv_draw_rect_dsc_t d;
          lv_draw_rect_dsc_init(&d);
          d.border_width = 0;
          d.shadow_width = 0;
          d.bg_opa = LV_OPA_COVER;

          lv_draw_rect_dsc_t e;
          lv_draw_rect_dsc_init(&e);
          e.border_width = 0;
          e.shadow_width = 0;
          e.bg_opa = LV_OPA_COVER;
          e.bg_color = lv_color_black();
          e.radius = 0;

          // Clear previously drawn particles that are now outside active count.
          for (int i = N; i < MAX_PARTICLES; i++) {
            if (!p[i].prev_drawn) continue;
            int rr2 = (int)p[i].pr + 2;
            if (rr2 < 1) rr2 = 1;
            lv_canvas_draw_rect(id(ss_canvas),
                                (int)p[i].pcx - rr2, (int)p[i].pcy - rr2,
                                rr2 * 2, rr2 * 2,
                                &e);
            p[i].prev_drawn = 0;
          }

          for (int i = 0; i < N; i++) {
            if (p[i].prev_drawn) {
              int rr2 = (int)p[i].pr + 2;
              if (rr2 < 1) rr2 = 1;

              lv_canvas_draw_rect(id(ss_canvas),
                                  (int)p[i].pcx - rr2, (int)p[i].pcy - rr2,
                                  rr2 * 2, rr2 * 2,
                                  &e);
              p[i].prev_drawn = 0;
            }

            const float nx = p[i].x / (float)${SS_W};
            const float ny = p[i].y / (float)${SS_H};
            const float flow_a =
                sinf((nx * 5.1f) + (flow_t * 0.54f) + p[i].phase) * 0.70f +
                cosf((ny * 4.4f) - (flow_t * 0.31f) + p[i].phase * 0.7f) * 0.45f +
                sinf(((nx + ny) * 2.6f) + (flow_t * 0.18f) + p[i].phase * 1.4f) * 0.22f;
            const float target_angle = flow_a * 1.10f;
            const float delta = wrap_angle(target_angle - p[i].angle);
            p[i].angle += delta * std::min(1.0f, dt * 1.7f);

            const float speed_mod = 0.88f + 0.18f * sinf((time_s * (0.34f + 0.02f * (float)(p[i].color + 1))) + (p[i].phase * 1.9f));
            const float vx = cosf(p[i].angle) * p[i].speed * speed_mod;
            const float vy = sinf(p[i].angle) * p[i].speed * speed_mod;
            p[i].x += vx * dt;
            p[i].y += vy * dt;

            const float wrap_margin = 18.0f;
            if (p[i].x < -wrap_margin) {
              p[i].x = ${SS_W} + wrap_margin;
              p[i].y += (float) rnd_i(-8, 9);
            } else if (p[i].x > ${SS_W} + wrap_margin) {
              p[i].x = -wrap_margin;
              p[i].y += (float) rnd_i(-8, 9);
            }
            if (p[i].y < -wrap_margin) {
              p[i].y = ${SS_H} + wrap_margin;
              p[i].x += (float) rnd_i(-8, 9);
            } else if (p[i].y > ${SS_H} + wrap_margin) {
              p[i].y = -wrap_margin;
              p[i].x += (float) rnd_i(-8, 9);
            }

            const float pulse = 0.38f + 0.62f * (0.5f + 0.5f * sinf((time_s * (0.95f + 0.04f * (float)p[i].size)) + (p[i].phase * 2.3f)));
            const int r = (int)p[i].size;

            const int cx = (int)p[i].x + ${SS_X_OFFSET};
            const int cy = (int)p[i].y + ${SS_Y_OFFSET};

            if (cx + r < 0 || cx - r >= ${SS_W} || cy + r < 0 || cy - r >= ${SS_H}) continue;

            const int idx = (int)(p[i].color % 3);
            uint8_t rr = (uint8_t)((float)pr_[idx] * pulse);
            uint8_t gg = (uint8_t)((float)pg_[idx] * pulse);
            uint8_t bb = (uint8_t)((float)pb_[idx] * pulse);

            if (rr < 6 && gg < 6 && bb < 6) {
              p[i].prev_drawn = 0;
              continue;
            }

            d.bg_color = lv_color_make(rr, gg, bb);
            d.radius   = r;

            lv_canvas_draw_rect(id(ss_canvas),
                                cx - r, cy - r,
                                r * 2, r * 2,
                                &d);

            p[i].pcx = (int16_t)cx;
            p[i].pcy = (int16_t)cy;
            p[i].pr  = (uint8_t)((r > 255) ? 255 : r);
            p[i].prev_drawn = 1;
          }
