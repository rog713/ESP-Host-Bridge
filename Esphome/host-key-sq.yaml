    - id: Docker
      bg_color: 0x001F67
      scrollbar_mode: "OFF"

      scrollable: false
      on_load:
        then:
          - lambda: |-
              id(ui_last_page_idx) = ${PAGE_DOCKER};
              if (id(docker_header) != nullptr) {
                lv_obj_set_style_bg_grad_dir(id(docker_header), LV_GRAD_DIR_HOR, 0);
                lv_obj_set_style_bg_color(id(docker_header), lv_color_make(0x00, 0x15, 0x44), 0);
                lv_obj_set_style_bg_grad_color(id(docker_header), lv_color_make(0x00, 0x0B, 0x26), 0);
                lv_obj_set_style_border_width(id(docker_header), 1, 0);
                lv_obj_set_style_border_side(id(docker_header), LV_BORDER_SIDE_BOTTOM, 0);
                lv_obj_set_style_border_color(id(docker_header), lv_color_make(0x2D, 0x58, 0xBC), 0);
                lv_obj_set_style_border_opa(id(docker_header), LV_OPA_60, 0);
              }

              auto style_sw = [&](lv_obj_t *sw) {
                if (sw == nullptr) return;
                const lv_style_selector_t checked =
                    ((lv_style_selector_t) LV_PART_INDICATOR) | ((lv_style_selector_t) LV_STATE_CHECKED);
                lv_obj_set_style_radius(sw, 18, LV_PART_MAIN);
                lv_obj_set_style_bg_color(sw, lv_color_make(0x32, 0x3B, 0x4A), LV_PART_MAIN);
                lv_obj_set_style_bg_opa(sw, LV_OPA_COVER, LV_PART_MAIN);
                lv_obj_set_style_border_width(sw, 1, LV_PART_MAIN);
                lv_obj_set_style_border_color(sw, lv_color_make(0x54, 0x65, 0x7A), LV_PART_MAIN);
                lv_obj_set_style_border_opa(sw, LV_OPA_60, LV_PART_MAIN);

                lv_obj_set_style_bg_color(sw, lv_color_make(0x16, 0xA3, 0x4A), checked);
                lv_obj_set_style_bg_opa(sw, LV_OPA_COVER, checked);
                lv_obj_set_style_border_width(sw, 0, checked);

                lv_obj_set_style_bg_color(sw, lv_color_make(0xFF, 0xFF, 0xFF), LV_PART_KNOB);
                lv_obj_set_style_bg_opa(sw, LV_OPA_COVER, LV_PART_KNOB);
                lv_obj_set_style_radius(sw, LV_RADIUS_CIRCLE, LV_PART_KNOB);
              };
              style_sw(id(docker_row_0_status));
              style_sw(id(docker_row_1_status));
              style_sw(id(docker_row_2_status));
              style_sw(id(docker_row_3_status));
              style_sw(id(docker_row_4_status));
              style_sw(id(docker_row_5_status));
              style_sw(id(docker_row_6_status));
              style_sw(id(docker_row_7_status));
              style_sw(id(docker_row_8_status));
              style_sw(id(docker_row_9_status));

              id(docker_scroll_reset_pending) = true;
              // Always open Docker list from the top.
              if (id(docker_rows_cont) != nullptr) {
                lv_obj_scroll_to_y(id(docker_rows_cont), 0, LV_ANIM_OFF);
              }

