            lv_obj_clear_flag(card, LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(icon_lbl, LV_OBJ_FLAG_HIDDEN);
            lv_color_t icon_color = lv_color_make(0x67, 0xE8, 0xF9);
            if (it.state_key == "running") icon_color = lv_color_make(0x86, 0xEF, 0xAC);
            else if (it.state_key == "paused") icon_color = lv_color_make(0xFC, 0xD3, 0x4D);
            else if (it.state_key == "stopped") icon_color = lv_color_make(0xC0, 0x8A, 0xFF);
            lv_obj_set_style_text_color(icon_lbl, icon_color, 0);
            lv_obj_clear_flag(name_lbl, LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(state_lbl, it.state_label.c_str());
            lv_color_t text_color = lv_color_make(0xD1, 0xD5, 0xDB);
            lv_color_t bg_color = lv_color_make(0x1F, 0x29, 0x3A);
            lv_color_t border_color = lv_color_make(0x54, 0x65, 0x7A);
            if (it.state_key == "running") {
              text_color = lv_color_make(0xDC, 0xF7, 0xE8);
              bg_color = lv_color_make(0x0F, 0x3A, 0x26);
              border_color = lv_color_make(0x86, 0xEF, 0xAC);
            } else if (it.state_key == "paused") {
