                              - lambda: |-
                                  if (id(vms_name_modal_text) == nullptr) return;
                                  const char *raw_name = lv_label_get_text(id(vms_name_modal_text));
                                  const std::string name = raw_name == nullptr ? "" : std::string(raw_name);
                                  if (name.empty() || name == "--") return;
                                  const std::string cmd = std::string("CMD=vm_restart:") + name + "\n";
                                  id(usb_cdc_data).write_array(reinterpret_cast<const uint8_t *>(cmd.data()), cmd.size());
                                  id(vms_modal_state_key) = "running";
                              - script.execute: sync_vms_modal
                              - lvgl.widget.hide: vms_name_modal
                            widgets:
