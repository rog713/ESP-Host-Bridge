  - interval: 1s
    then:
      - lambda: |-
          if (!id(docker_metrics_enabled)) return;
          const uint32_t last = id(docker_last_ms);
          if (last == 0U || last == id(docker_summary_last_parsed_ms)) return;

          const std::string x = id(docker_containers_compact).state;
          int total = 0;
          int up = 0;
          int down = 0;
          size_t start = 0;

          auto to_lower = [&](std::string s) -> std::string {
            for (size_t i = 0; i < s.size(); i++) {
              char c = s[i];
              if (c >= 'A' && c <= 'Z') s[i] = (char)(c - 'A' + 'a');
            }
            return s;
          };

          while (start <= x.size()) {
            size_t end = x.find(';', start);
            std::string item = (end == std::string::npos) ? x.substr(start) : x.substr(start, end - start);
            if (!item.empty()) {
              size_t sep = item.find('|');
              if (sep == std::string::npos) sep = item.find('=');
              std::string name = item.substr(0, sep);
              std::string status = (sep == std::string::npos) ? "--" : item.substr(sep + 1);
              if (!name.empty()) {
                if (status.empty()) status = "--";
                total++;
                const std::string ls = to_lower(status);
                const bool is_up = (ls.find("up") != std::string::npos) || (ls.find("running") != std::string::npos) || (ls.find("healthy") != std::string::npos);
                if (is_up) up++;
                else down++;
              }
            }
            if (end == std::string::npos) break;
            start = end + 1;
          }

          id(docker_containers_total_last) = (float) total;
          id(docker_containers_running_last) = (float) up;
          id(docker_containers_down_last) = (float) down;
          id(docker_summary_last_parsed_ms) = last;
