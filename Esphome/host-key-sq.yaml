          auto sample_to_y = [&](uint32_t v) -> int {
            // Scale (kbps) to pixel height.
            const int h = std::max(1, H - 2);
            int y = base_y - (int)(((uint64_t)v * (uint64_t)h) / (uint64_t)maxv);
            if (y < 0) y = 0;
            if (y > base_y) y = base_y;
            return y;
          };

          auto interp_at_x = [&](const std::array<uint32_t, 48> &arr, int x) -> uint32_t {
            if (W <= 1) return arr[srcN - 1];
            const int denom = W - 1;
            const int n = x * (srcN - 1);
            const int i0 = n / denom;
            const int frac = n - i0 * denom;  // 0..denom-1
            const int i1 = (i0 < (srcN - 1)) ? (i0 + 1) : i0;
            const int64_t v0 = (int64_t)arr[i0];
            const int64_t v1 = (int64_t)arr[i1];
            int64_t v = v0 + ((v1 - v0) * (int64_t)frac) / (int64_t)denom;
            if (v < 0) v = 0;
            if (v > 0xFFFFFFFFLL) v = 0xFFFFFFFFLL;
            return (uint32_t)v;
          };

          // Subtle grid (2 horizontal guides + baseline).
          lv_draw_line_dsc_t grid;
          lv_draw_line_dsc_init(&grid);
          grid.width = 1;
          grid.opa = LV_OPA_60;
          grid.color = lv_color_make(0x00, 0x15, 0x44);  // darker than page bg
          lv_point_t g1, g2;
          lv_point_t pts2[2];
          for (int k = 1; k <= 2; k++) {
            const int y = (H * k) / 3;
            g1.x = 0; g1.y = y;
            g2.x = W - 1; g2.y = y;
            pts2[0] = g1;
            pts2[1] = g2;
            lv_canvas_draw_line(id(info_net_graph), pts2, 2, &grid);
          }
          grid.opa = LV_OPA_90;
          g1.x = 0; g1.y = base_y;
          g2.x = W - 1; g2.y = base_y;
          pts2[0] = g1;
          pts2[1] = g2;
          lv_canvas_draw_line(id(info_net_graph), pts2, 2, &grid);

          // RX: cyan
          lv_draw_line_dsc_t rx_fill;
          lv_draw_line_dsc_init(&rx_fill);
          rx_fill.width = 1;
          rx_fill.opa = LV_OPA_50;
          rx_fill.color = lv_color_make(0x38, 0xBD, 0xF8);

          lv_draw_line_dsc_t rx_line;
          lv_draw_line_dsc_init(&rx_line);
          rx_line.width = 2;
          rx_line.opa = LV_OPA_COVER;
          rx_line.color = lv_color_make(0x38, 0xBD, 0xF8);
          rx_line.round_start = 1;
          rx_line.round_end = 1;

          // TX: purple
          lv_draw_line_dsc_t tx_fill;
          lv_draw_line_dsc_init(&tx_fill);
          tx_fill.width = 1;
          tx_fill.opa = LV_OPA_40;
          tx_fill.color = lv_color_make(0xA8, 0x55, 0xF7);

          lv_draw_line_dsc_t tx_line;
          lv_draw_line_dsc_init(&tx_line);
          tx_line.width = 2;
          tx_line.opa = LV_OPA_COVER;
          tx_line.color = lv_color_make(0xA8, 0x55, 0xF7);
          tx_line.round_start = 1;
          tx_line.round_end = 1;

          // Filled areas (drawn first).
          for (int x = 0; x < W; x++) {
            const uint32_t rxv = interp_at_x(id(net_rx_hist), x);
