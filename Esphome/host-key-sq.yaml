  - id: redraw_net_graph
    then:
      - lambda: |-
          if (id(info_net_graph) == nullptr) return;
          if (id(Info_1) == nullptr || id(Info_1)->obj == nullptr) return;
          // Only draw when the Network page is actually visible.
          if (lv_scr_act() != id(Info_1)->obj) return;

          const int W = (int) lv_obj_get_width(id(info_net_graph));
          const int H = (int) lv_obj_get_height(id(info_net_graph));

          lv_canvas_fill_bg(id(info_net_graph), lv_color_make(0x2D, 0x58, 0xBC), LV_OPA_COVER);

          const uint32_t now = millis();
          const uint32_t rx_ms = id(net_rx_last_ms);
          const uint32_t tx_ms = id(net_tx_last_ms);
          const bool have_data = id(net_has_data) && rx_ms != 0U && tx_ms != 0U;
          const uint32_t age_ms = have_data ? (uint32_t) std::max((uint32_t)(now - rx_ms), (uint32_t)(now - tx_ms)) : 0U;
          const bool stale = have_data && age_ms > 15000U;
          const bool offline_suppressed =
              id(display_sleeping) ||
              (id(host_offline_grace_until_ms) != 0U &&
               (int32_t)(id(host_offline_grace_until_ms) - now) > 0);
          const bool offline =
              !offline_suppressed &&
              (id(host_power_state) == 3 ||
               (id(host_serial_seen) && id(host_serial_last_ms) != 0U &&
                (uint32_t)(now - id(host_serial_last_ms)) > 5000U));

          const uint32_t buckets[] = {
            1000U, 2500U, 5000U, 10000U, 25000U, 50000U,
            100000U, 250000U, 500000U, 1000000U, 2500000U, 5000000U
          };
          auto next_bucket = [&](uint32_t v) -> uint32_t {
            for (uint32_t b : buckets) {
              if (v <= b) return b;
            }
            return buckets[(sizeof(buckets) / sizeof(buckets[0])) - 1];
          };
          auto format_scale = [&](uint32_t kbps) -> std::string {
            char buf[24];
            if (kbps >= 1000000U) {
              if ((kbps % 1000000U) == 0U) snprintf(buf, sizeof(buf), "%u Gb/s", (unsigned) (kbps / 1000000U));
              else snprintf(buf, sizeof(buf), "%.1f Gb/s", kbps / 1000000.0f);
            } else {
              if ((kbps % 1000U) == 0U) snprintf(buf, sizeof(buf), "%u Mb/s", (unsigned) (kbps / 1000U));
              else snprintf(buf, sizeof(buf), "%.1f Mb/s", kbps / 1000.0f);
            }
            return std::string(buf);
          };

          uint32_t peak = 0U;
          if (have_data) {
            for (int i = 0; i < 48; i++) {
              peak = std::max(peak, id(net_rx_hist)[i]);
              peak = std::max(peak, id(net_tx_hist)[i]);
            }
            peak = std::max(peak, (uint32_t) (std::max(0.0f, id(net_rx_kbps_last)) + 0.5f));
            peak = std::max(peak, (uint32_t) (std::max(0.0f, id(net_tx_kbps_last)) + 0.5f));
          }
          const uint32_t target_maxv = next_bucket(std::max(peak, 1U));
          uint32_t maxv = id(net_scale_kbps);
          if (maxv < buckets[0] || maxv > buckets[(sizeof(buckets) / sizeof(buckets[0])) - 1]) {
            maxv = buckets[3];
          }
          if (have_data) {
            if (target_maxv > maxv) {
              maxv = target_maxv;
              id(net_scale_kbps) = maxv;
              id(net_scale_last_adjust_ms) = now;
            } else if (target_maxv < maxv) {
              const bool shrink_ok =
                  peak <= (uint32_t) ((float) maxv * 0.60f) &&
                  (id(net_scale_last_adjust_ms) == 0U ||
                   (uint32_t) (now - id(net_scale_last_adjust_ms)) > 15000U);
              if (shrink_ok) {
                maxv = target_maxv;
                id(net_scale_kbps) = maxv;
                id(net_scale_last_adjust_ms) = now;
              }
            }
          }
          if (id(info_net_scale_label) != nullptr) {
            if (!have_data) {
              lv_obj_add_flag(id(info_net_scale_label), LV_OBJ_FLAG_HIDDEN);
            } else {
              const std::string scale_text = format_scale(maxv);
              lv_label_set_text(id(info_net_scale_label), scale_text.c_str());
              lv_obj_clear_flag(id(info_net_scale_label), LV_OBJ_FLAG_HIDDEN);
            }
          }

          // Unified status badge.
          if (id(info_net_loading_label) != nullptr) {
            if (offline) {
              lv_label_set_text(id(info_net_loading_label), "OFFLINE");
              lv_obj_set_style_text_color(id(info_net_loading_label), lv_color_make(0xF9, 0xA8, 0xD4), 0);
              lv_obj_clear_flag(id(info_net_loading_label), LV_OBJ_FLAG_HIDDEN);
            } else if (!have_data) {
              lv_label_set_text(id(info_net_loading_label), "LOADING");
              lv_obj_set_style_text_color(id(info_net_loading_label), lv_color_make(0xFC, 0xD3, 0x4D), 0);
              lv_obj_clear_flag(id(info_net_loading_label), LV_OBJ_FLAG_HIDDEN);
            } else if (stale) {
              lv_label_set_text(id(info_net_loading_label), "STALE");
              lv_obj_set_style_text_color(id(info_net_loading_label), lv_color_make(0xFD, 0xBA, 0x74), 0);
              lv_obj_clear_flag(id(info_net_loading_label), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_label_set_text(id(info_net_loading_label), "LIVE");
              lv_obj_set_style_text_color(id(info_net_loading_label), lv_color_make(0x86, 0xEF, 0xAC), 0);
              lv_obj_clear_flag(id(info_net_loading_label), LV_OBJ_FLAG_HIDDEN);
            }
          }

          // Values + subtle stale fade.
          if (id(info_net_rx_value) != nullptr) {
            lv_obj_set_style_text_color(id(info_net_rx_value), stale ? lv_color_make(0x9C, 0xA3, 0xAF) : lv_color_make(0xE0, 0xF2, 0xFE), 0);
            if (have_data && !stale) {
              const float kbps = id(net_rx_kbps_last);
              const float Mbps = kbps / 1000.0f;  // kbps (kilobits/s) -> Mb/s (megabits/s)
              char buf[24];
              if (Mbps < 10.0f) snprintf(buf, sizeof(buf), "%.2f", Mbps);
              else if (Mbps < 100.0f) snprintf(buf, sizeof(buf), "%.1f", Mbps);
              else snprintf(buf, sizeof(buf), "%.0f", Mbps);
              lv_label_set_text(id(info_net_rx_value), buf);
            } else if (!have_data) {
              lv_label_set_text(id(info_net_rx_value), "--");
            }
            if (id(info_net_rx_unit) != nullptr) { if (!have_data) lv_obj_add_flag(id(info_net_rx_unit), LV_OBJ_FLAG_HIDDEN); else { lv_obj_clear_flag(id(info_net_rx_unit), LV_OBJ_FLAG_HIDDEN); lv_obj_align_to(id(info_net_rx_unit), id(info_net_rx_value), LV_ALIGN_OUT_RIGHT_MID, 2, 6); } }
          }

          if (id(info_net_tx_value) != nullptr) {
            lv_obj_set_style_text_color(id(info_net_tx_value), stale ? lv_color_make(0x9C, 0xA3, 0xAF) : lv_color_make(0xF3, 0xE8, 0xFF), 0);
            if (have_data && !stale) {
              const float kbps = id(net_tx_kbps_last);
              const float Mbps = kbps / 1000.0f;
              char buf[24];
              if (Mbps < 10.0f) snprintf(buf, sizeof(buf), "%.2f", Mbps);
              else if (Mbps < 100.0f) snprintf(buf, sizeof(buf), "%.1f", Mbps);
              else snprintf(buf, sizeof(buf), "%.0f", Mbps);
              lv_label_set_text(id(info_net_tx_value), buf);
            } else if (!have_data) {
              lv_label_set_text(id(info_net_tx_value), "--");
            }
            if (id(info_net_tx_unit) != nullptr) { if (!have_data) lv_obj_add_flag(id(info_net_tx_unit), LV_OBJ_FLAG_HIDDEN); else { lv_obj_clear_flag(id(info_net_tx_unit), LV_OBJ_FLAG_HIDDEN); lv_obj_align_to(id(info_net_tx_unit), id(info_net_tx_value), LV_ALIGN_OUT_RIGHT_MID, 2, 6); } }
          }

          // UNAS-style throughput chart: dual line + filled area under each line.
          // Keep this cheap: 1px vertical fills + line segments (runs at 1Hz).
          const int srcN = 48;
