            lv_obj_t *icon_lbl = row_icon(idx);
            lv_obj_t *name_lbl = row_name(idx);
            lv_obj_t *state_lbl = row_state(idx);
            if (card == nullptr || icon_lbl == nullptr || name_lbl == nullptr || state_lbl == nullptr) return;
            char detail[64];
            if (it.vcpus > 0 && it.mem_mib > 0) snprintf(detail, sizeof(detail), "%d vCPU / %d MiB", it.vcpus, it.mem_mib);
            else if (it.vcpus > 0) snprintf(detail, sizeof(detail), "%d vCPU", it.vcpus);
            else if (it.mem_mib > 0) snprintf(detail, sizeof(detail), "%d MiB", it.mem_mib);
